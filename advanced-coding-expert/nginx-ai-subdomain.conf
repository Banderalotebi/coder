# Nginx Configuration for ai.techpartner.sa
# Place this in /etc/nginx/sites-available/ai.techpartner

server {
    listen 80;
    server_name ai.techpartner.sa;

    location / {
        proxy_pass http://localhost:8000; # The Python FastAPI port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

